name: CI/CD - Lint and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint / 代码检查
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code / 检出代码
        uses: actions/checkout@v4

      - name: Set up Python / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies / 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy flake8

      - name: Black code formatting check / Black 代码格式检查
        run: |
          black --check src/map_agent tests/

      - name: Ruff linting / Rint 代码检查
        run: |
          ruff check src/map_agent tests/

      - name: Flake8 linting / Flake8 代码检查
        run: |
          flake8 src/map_agent tests/ --max-line-length=100 --exclude=migrations

      - name: Type checking with mypy / Mypy 类型检查
        run: |
          pip install mypy
          mypy src/map_agent --ignore-missing-imports

  test:
    name: Test / 测试
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code / 检出代码
        uses: actions/checkout@v4

      - name: Set up Python / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies / 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with pytest / 使用 pytest 运行测试
        run: |
          pytest --cov=map_agent --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov / 上传覆盖率到 Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage artifacts / 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-python-${{ matrix.python-version }}
          path: htmlcov/
